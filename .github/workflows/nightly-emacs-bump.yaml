name: nightly-emacs-bump
on:
  schedule:
    - cron: "0 14 * * *"   # daily 14:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: nightly-emacs-bump
  cancel-in-progress: false

env:
  # Run the JS actions on Node 24; Node 20 is deprecated on GitHub runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bump-and-maybe-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jdx/mise-action@v3

      - name: Bump all flavors to latest
        id: bump
        run: |
          changed=()
          for flavor in emacs-master emacs-mac-master; do
            mise run bump "$flavor" latest
            if ! git diff --quiet "pkgs/$flavor/lockfile.toml"; then
              changed+=("$flavor")
            fi
          done
          if [ ${#changed[@]} -eq 0 ]; then
            echo "changed=" >> "$GITHUB_OUTPUT"
            echo "::notice::No flavor moved; nothing to release today."
          else
            echo "changed=${changed[*]}" >> "$GITHUB_OUTPUT"
            echo "::notice::Changed: ${changed[*]}"
          fi

      - name: Build and validate changed flavors
        if: steps.bump.outputs.changed != ''
        run: |
          for flavor in ${{ steps.bump.outputs.changed }}; do
            mise run build "$flavor"
          done
          mise run validate

      - name: Commit the bump(s)
        if: steps.bump.outputs.changed != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(pkgs): nightly bump (${{ steps.bump.outputs.changed }})"
          git pull --rebase origin main
          git push origin main

      - name: Dispatch release.yaml per changed flavor
        if: steps.bump.outputs.changed != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for flavor in ${{ steps.bump.outputs.changed }}; do
            gh workflow run release.yaml -f flavor="$flavor"
          done

      - name: Open or comment on triage issue (failure dedupe)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: "open",
              labels: "nightly-bump",
            });
            const link = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Workflow run: ${link}`;
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Another nightly-bump failure. ${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Nightly emacs bump failed: run ${context.runId}`,
                body,
                labels: ["nightly-bump", "needs-triage"],
              });
            }
