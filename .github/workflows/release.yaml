name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "CalVer (default: today's date with collision suffix)"
        required: false

permissions:
  contents: write       # create release + tag
  id-token: write       # attest-build-provenance
  attestations: write   # attest-build-provenance

concurrency:
  group: release-${{ github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, asset_os: macos, asset_arch: arm64 }
          # Linux entries land here later (e.g. ubuntu-latest / linux / x86_64).
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # so compute-version.sh can list all tags

      - uses: jdx/mise-action@v3

      - name: Resolve version
        run: |
          bash scripts/cli/compute-version.sh "${{ inputs.version }}" >> "$GITHUB_ENV"

      - name: Refuse to overwrite an existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release $VERSION already exists. Releases are immutable; supersede with a new CalVer version (e.g. ${VERSION}.1)."
            exit 1
          fi

      - name: Build and validate Emacs.app
        run: mise run validate

      - name: Package release artifacts
        run: bash scripts/cli/release.sh "$VERSION"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: build/release/${{ env.VERSION }}/RELEASE_NOTES.md
          files: |
            build/release/${{ env.VERSION }}/misemacs-*.tar.gz
            build/release/${{ env.VERSION }}/SHASUMS256.txt
            build/release/${{ env.VERSION }}/build-manifest.org
          fail_on_unmatched_files: true
          generate_release_notes: true   # appends GitHub's auto-changelog under our body

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: build/release/${{ env.VERSION }}/misemacs-*.tar.gz
