name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "CalVer (default: today's date with collision suffix)"
        required: false
      flavor:
        description: "Single flavor to release (default: all)"
        required: false
      verify:
        description: "After releasing, dispatch verify-published (aqua-install smoke-test). Opt-in: needs verify-published.yaml on the default branch + the aqua registry entry live."
        type: boolean
        required: false
        default: false
      force:
        description: "Rebuild + re-release even if this flavor's inputs are unchanged."
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write
  actions: write       # to dispatch verify-published.yaml (optional)

env:
  # Run the JS actions (checkout, mise-action, attest, gh-release) on Node 24;
  # Node 20 is deprecated on GitHub runners (forced to 24 on 2026-06-02, removed 2026-09-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # CI hydrate shallow-fetches the pinned sha (~55 MB) instead of a full mirror clone (~600 MB).
  MISEMACS_SHALLOW: "1"

concurrency:
  group: release-${{ github.event.inputs.flavor || 'all' }}-${{ github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        flavor: ${{ github.event.inputs.flavor && fromJSON(format('["{0}"]', github.event.inputs.flavor)) || fromJSON('["emacs-master","emacs-mac-master"]') }}
        include:
          - { os: macos-14, asset_os: macos, asset_arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v3

      - name: Check whether inputs changed since the last release
        id: changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FLAVOR: ${{ matrix.flavor }}
          VERSION_INPUT: ${{ inputs.version }}
          FORCE_INPUT: ${{ inputs.force }}
        run: |
          # Skip the (~11-min) build + a redundant release when this flavor's
          # build inputs are byte-identical to its most recent release.
          # Version-aware latest-selection, gh --limit, and the --force/--version
          # escape hatch live in scripts/cli/should_release.exs (unit-tested).
          args=("$FLAVOR")
          [ -n "$VERSION_INPUT" ] && args+=(--version "$VERSION_INPUT")
          [ "$FORCE_INPUT" = "true" ] && args+=(--force)
          elixir scripts/cli/should_release.exs "${args[@]}" >> "$GITHUB_OUTPUT"

      - name: Resolve version
        if: steps.changed.outputs.changed == 'true'
        env:
          FLAVOR: ${{ matrix.flavor }}
          VERSION_INPUT: ${{ inputs.version }}
        run: elixir scripts/cli/compute_version.exs "$FLAVOR" >> "$GITHUB_ENV"

      - name: Refuse to overwrite an existing release
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release $VERSION already exists. Releases are immutable; supersede with a new CalVer (e.g. ${VERSION}.1)."
            exit 1
          fi

      - name: Build and validate
        if: steps.changed.outputs.changed == 'true'
        run: |
          mise run build "${{ matrix.flavor }}"
          mise run validate

      - name: Package release artifacts
        if: steps.changed.outputs.changed == 'true'
        run: bash scripts/cli/release.sh "${{ matrix.flavor }}" "$VERSION"

      - name: Create GitHub release
        if: steps.changed.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: build/release/${{ env.VERSION }}/RELEASE_NOTES.md
          files: |
            build/release/${{ env.VERSION }}/misemacs-*.tar.gz
            build/release/${{ env.VERSION }}/SHASUMS256.txt
            build/release/${{ env.VERSION }}/build-manifest.org
            build/release/${{ env.VERSION }}/inputs.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Attest build provenance
        if: steps.changed.outputs.changed == 'true'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: build/release/${{ env.VERSION }}/misemacs-*.tar.gz

      - name: Verify the published release artifact
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download the asset we just published, verify its checksum, extract,
          # and run it — confirms the uploaded tarball is intact + runnable.
          # (The aqua-install path is covered separately by verify-published.yaml.)
          tmp="$(mktemp -d)"
          gh release download "$VERSION" --repo "${{ github.repository }}" \
            --pattern 'misemacs-*.tar.gz' --pattern 'SHASUMS256.txt' --dir "$tmp"
          ( cd "$tmp" && shasum -a 256 -c SHASUMS256.txt )
          tar -xzf "$tmp"/misemacs-*.tar.gz -C "$tmp"
          app="$tmp/misemacs-${VERSION}-macos-arm64/Emacs.app"
          "$app/Contents/MacOS/Emacs" --version
          "$app/Contents/MacOS/bin/emacsclient" --version
          "$app/Contents/MacOS/Emacs" -Q -batch \
            -L "$app/Contents/Resources/site-lisp" \
            -l moto-emacs-doctor -f moto-emacs-doctor-batch

      - name: Dispatch verify-published (optional, opt-in)
        if: steps.changed.outputs.changed == 'true' && inputs.verify
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # workflow_dispatch IS an exception to the GITHUB_TOKEN no-recursion
          # rule, so this actually triggers verify-published (unlike the
          # release:published event, which a GITHUB_TOKEN-created release does
          # not fire). continue-on-error keeps a not-yet-ready verify (e.g.
          # registry entry not live, or this file not yet on the default branch)
          # from failing the release.
          gh workflow run verify-published.yaml --repo "${{ github.repository }}" -f tag="$VERSION"
