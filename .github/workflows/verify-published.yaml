name: verify-published
on:
  release:
    types: [published]

permissions:
  contents: read
  issues: write   # for failure issue

jobs:
  verify-aqua-install:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        env:
          # Point mise at THIS repo's aqua registry on the freshly published commit.
          MISE_AQUA_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/aqua/registry.yaml

      - name: Install misemacs via aqua
        env:
          MISE_AQUA_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/aqua/registry.yaml
        run: |
          mise install "aqua:djgoku/misemacs@${{ github.event.release.tag_name }}"

      - name: Smoke-test installed binaries
        env:
          MISE_AQUA_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/aqua/registry.yaml
        run: |
          mise exec "aqua:djgoku/misemacs@${{ github.event.release.tag_name }}" -- emacs --version
          mise exec "aqua:djgoku/misemacs@${{ github.event.release.tag_name }}" -- emacsclient --version
          mise exec "aqua:djgoku/misemacs@${{ github.event.release.tag_name }}" -- emacs -Q -batch \
            --eval '(message "verify-published: emacs-version=%s" emacs-version)'

      - name: Open triage issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `verify-published failed for ${context.payload.release.tag_name}`,
              body: `Release ${context.payload.release.html_url} did not install cleanly via aqua. Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["verify-published", "needs-triage"],
            });
