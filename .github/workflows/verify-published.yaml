name: verify-published
on:
  release:
    types: [published]

permissions:
  contents: read
  issues: write   # for failure issue

jobs:
  verify-aqua-install:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3

      - name: Install + smoke-test the published build
        run: |
          tag='${{ github.event.release.tag_name }}'
          mise install "aqua:djgoku/misemacs@${tag}"
          mise exec "aqua:djgoku/misemacs@${tag}" -- emacs --version
          mise exec "aqua:djgoku/misemacs@${tag}" -- emacsclient --version
          mise exec "aqua:djgoku/misemacs@${tag}" -- emacs -Q -batch \
            --eval '(message "verify-published: emacs-version=%s" emacs-version)'

      - name: Open triage issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `verify-published failed for ${context.payload.release.tag_name}`,
              body: `Release ${context.payload.release.html_url} did not install cleanly via aqua. Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["verify-published", "needs-triage"],
            });
