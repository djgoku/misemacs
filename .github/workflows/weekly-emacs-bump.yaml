name: weekly-emacs-bump
on:
  schedule:
    - cron: "0 14 * * 1"   # Mondays 14:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: weekly-emacs-bump
  cancel-in-progress: false

jobs:
  bump-and-maybe-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jdx/mise-action@v3

      - name: Bump emacs to latest emacsmirror SHA
        id: bump
        run: |
          mise run bump emacs latest
          if git diff --quiet pkgs/emacs/lockfile.toml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No new emacs SHA; nothing to release this week."
          else
            new_sha=$(awk -F'"' '/^sha/{print $2}' pkgs/emacs/lockfile.toml)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "new_sha=$new_sha" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate new build
        if: steps.bump.outputs.changed == 'true'
        run: mise run validate

      - name: Commit and push the bump
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(pkgs/emacs): weekly bump to ${{ steps.bump.outputs.new_sha }}"
          # Absorb any human commit that landed during the build window. The
          # cron's commit only touches pkgs/emacs/lockfile.toml; rebase
          # conflicts only when a human bumped emacs in parallel — fail and
          # let the issue-opener step run instead of pushing a half-good state.
          git pull --rebase origin main
          git push origin main

      - name: Dispatch release.yaml
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yaml

      - name: Open or comment on triage issue (failure dedupe)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: "open",
              labels: "weekly-bump",
            });
            const link = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Workflow run: ${link}`;
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Another weekly-bump failure. ${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Weekly emacs bump failed: run ${context.runId}`,
                body,
                labels: ["weekly-bump", "needs-triage"],
              });
            }
